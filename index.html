<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ana's Face Games</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d0d0d;
    color: #f0f0f0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
  }

  header {
    text-align: center;
    padding: 2rem 1rem 1rem;
  }

  header h1 {
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: 2px;
    background: linear-gradient(135deg, #e96cff, #ff6cb4, #ffd86c);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  header p { color: #888; margin-top: 0.4rem; font-size: 0.9rem; }

  nav {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 0.6rem;
    padding: 1.2rem 1rem;
    border-bottom: 1px solid #222;
  }

  nav button {
    background: #1a1a1a;
    color: #ccc;
    border: 1px solid #333;
    border-radius: 2rem;
    padding: 0.55rem 1.3rem;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  nav button:hover { border-color: #e96cff; color: #fff; }
  nav button.active {
    background: linear-gradient(135deg, #e96cff, #ff6cb4);
    color: #fff;
    border-color: transparent;
    font-weight: 600;
  }

  #game-area {
    max-width: 720px;
    margin: 0 auto;
    padding: 1.5rem 1rem 3rem;
  }

  .game-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1rem;
    flex-wrap: wrap;
    gap: 0.5rem;
  }

  .game-title { font-size: 1.3rem; font-weight: 600; }

  .stats {
    display: flex;
    gap: 0.6rem;
    font-size: 0.85rem;
    color: #aaa;
  }

  .stats span {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 1rem;
    padding: 0.3rem 0.8rem;
  }

  .btn {
    background: #1a1a1a;
    color: #ddd;
    border: 1px solid #333;
    border-radius: 0.5rem;
    padding: 0.5rem 1.2rem;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn:hover { border-color: #e96cff; color: #fff; }

  .btn-primary {
    background: linear-gradient(135deg, #e96cff, #ff6cb4);
    border-color: transparent;
    color: #fff;
    font-weight: 600;
  }

  .btn-primary:hover { opacity: 0.85; }

  /* ── MEMORY MATCH ── */
  #memory-grid {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 4px;
  }

  .mem-card {
    aspect-ratio: 1;
    perspective: 600px;
    cursor: pointer;
  }

  .mem-card-inner {
    width: 100%; height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.35s;
    border-radius: 5px;
  }

  .mem-card.flipped .mem-card-inner { transform: rotateY(180deg); }
  .mem-card.matched .mem-card-inner { transform: rotateY(180deg); }
  .mem-card.matched .mem-card-front { box-shadow: 0 0 0 2px #e96cff; }

  .mem-card-back, .mem-card-front {
    position: absolute;
    inset: 0;
    border-radius: 5px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    overflow: hidden;
  }

  .mem-card-back {
    background: linear-gradient(135deg, #1e1e2e, #2a1a3e);
    border: 1px solid #3a2a4e;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.8rem;
  }

  .mem-card-front {
    transform: rotateY(180deg);
    background: #111;
  }

  /* ── SLIDING PUZZLE ── */
  #slide-grid {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 3px;
    background: #111;
    border: 2px solid #222;
    border-radius: 8px;
    padding: 3px;
    touch-action: none;
  }

  .slide-tile {
    aspect-ratio: 1;
    border-radius: 4px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.1s ease;
    position: relative;
  }

  .slide-tile:hover:not(.empty) { transform: scale(1.04); }
  .slide-tile.empty { background: #0a0a0a; cursor: default; }

  .slide-tile .tile-bg {
    width: 100%; height: 100%;
  }

  /* ── JIGSAW ── */
  #jigsaw-board {
    position: relative;
    border: 2px dashed #333;
    border-radius: 8px;
    background: #111;
    overflow: hidden;
    touch-action: none;
  }

  #jigsaw-target {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    grid-template-rows: repeat(8, 1fr);
    pointer-events: none;
    z-index: 0;
  }

  .jigsaw-slot { border: 1px solid #1a1a1a; }

  .jigsaw-piece {
    position: absolute;
    cursor: grab;
    border-radius: 3px;
    overflow: hidden;
    border: 2px solid transparent;
    z-index: 1;
    touch-action: none;
    user-select: none;
    transition: box-shadow 0.1s;
  }

  .jigsaw-piece:active { cursor: grabbing; }
  .jigsaw-piece.dragging { z-index: 100; box-shadow: 0 6px 20px rgba(233,108,255,0.5); }
  .jigsaw-piece.placed { border-color: rgba(233,108,255,0.6); cursor: default; pointer-events: none; z-index: 1; }

  .jigsaw-piece .tile-bg { width: 100%; height: 100%; }

  /* ── FACE REVEAL ── */
  #reveal-grid {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 3px;
  }

  .reveal-tile {
    aspect-ratio: 1;
    position: relative;
    border-radius: 4px;
    overflow: hidden;
    cursor: pointer;
  }

  .reveal-tile .tile-bg {
    width: 100%; height: 100%;
  }

  .reveal-cover {
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, #1e1e2e, #2a1a3e);
    border: 1px solid #3a2a4e;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.8rem;
    transition: opacity 0.35s, transform 0.35s;
    border-radius: 4px;
  }

  .reveal-tile.revealed .reveal-cover {
    opacity: 0;
    transform: scale(0.7);
    pointer-events: none;
  }

  /* ── WIN OVERLAY ── */
  .win-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.78);
    z-index: 999;
    align-items: center;
    justify-content: center;
  }

  .win-overlay.show { display: flex; }

  .win-box {
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 1rem;
    padding: 2rem;
    text-align: center;
    max-width: 320px;
    width: 90%;
  }

  .win-box h2 {
    font-size: 1.8rem;
    margin-bottom: 0.5rem;
    background: linear-gradient(135deg, #e96cff, #ff6cb4, #ffd86c);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .win-box p { color: #aaa; margin-bottom: 1.5rem; }
</style>
</head>
<body>

<header>
  <h1>Ana's Face Games</h1>
  <p>8×8 · 64 pieces · good luck</p>
</header>

<nav>
  <button class="active" onclick="selectGame('memory')">Memory Match</button>
  <button onclick="selectGame('slide')">Sliding Puzzle</button>
  <button onclick="selectGame('jigsaw')">Jigsaw</button>
  <button onclick="selectGame('reveal')">Face Reveal</button>
</nav>

<div id="game-area"></div>

<div class="win-overlay" id="win-overlay">
  <div class="win-box">
    <h2 id="win-title">You Did It!</h2>
    <p id="win-msg"></p>
    <button class="btn btn-primary" id="win-replay">Play Again</button>
  </div>
</div>

<script>
const IMG  = 'ana.jpg';
const GRID = 8;
const N    = GRID * GRID; // 64

function $(id) { return document.getElementById(id); }

function fmtTime(s) {
  const m = Math.floor(s / 60);
  return m > 0 ? `${m}m ${s % 60}s` : `${s}s`;
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// Returns inline style string for a background-image tile at (col, row)
function bgStyle(col, row) {
  const px = (col / (GRID - 1) * 100).toFixed(3);
  const py = (row / (GRID - 1) * 100).toFixed(3);
  return `background-image:url(${IMG});background-size:${GRID*100}% ${GRID*100}%;background-position:${px}% ${py}%;`;
}

function showWin(title, msg, replayFn) {
  $('win-title').textContent = title;
  $('win-msg').textContent   = msg;
  $('win-overlay').classList.add('show');
  $('win-replay').onclick = () => {
    $('win-overlay').classList.remove('show');
    replayFn();
  };
}

let gameCleanup = null;

function selectGame(name) {
  if (gameCleanup) { gameCleanup(); gameCleanup = null; }
  $('win-overlay').classList.remove('show');
  document.querySelectorAll('nav button').forEach((b, i) => {
    b.classList.toggle('active', ['memory','slide','jigsaw','reveal'][i] === name);
  });
  const area = $('game-area');
  if (name === 'memory') { area.innerHTML = memoryHTML();  gameCleanup = initMemory(); }
  if (name === 'slide')  { area.innerHTML = slideHTML();   gameCleanup = initSlide();  }
  if (name === 'jigsaw') { area.innerHTML = jigsawHTML();  gameCleanup = initJigsaw(); }
  if (name === 'reveal') { area.innerHTML = revealHTML();  gameCleanup = initReveal(); }
}

// ══════════════════════════════════════════════════════════
// 1. MEMORY MATCH  (8×8 = 64 cards, 32 unique pairs)
// ══════════════════════════════════════════════════════════
function memoryHTML() {
  return `
  <div class="game-header">
    <span class="game-title">Memory Match</span>
    <div class="stats">
      <span id="mem-moves">Moves: 0</span>
      <span id="mem-time">0:00</span>
    </div>
    <button class="btn" onclick="selectGame('memory')">Restart</button>
  </div>
  <div id="memory-grid"></div>`;
}

function initMemory() {
  // 32 unique pieces → 64 cards in 8×8 grid
  const uniquePieces = Array.from({length: N / 2}, (_, i) => i);
  const deck = shuffle([...uniquePieces, ...uniquePieces]);

  let moves = 0, matched = 0, flipped = [], locked = false;
  let seconds = 0, timer = null;

  const grid = $('memory-grid');
  grid.innerHTML = '';

  deck.forEach(pieceIdx => {
    const col = pieceIdx % GRID;
    const row = Math.floor(pieceIdx / GRID);

    const card = document.createElement('div');
    card.className = 'mem-card';
    card.dataset.piece = pieceIdx;
    card.innerHTML = `
      <div class="mem-card-inner">
        <div class="mem-card-back">✦</div>
        <div class="mem-card-front" style="${bgStyle(col, row)}"></div>
      </div>`;

    card.addEventListener('click', () => {
      if (locked || card.classList.contains('flipped') || card.classList.contains('matched')) return;
      if (!timer) timer = setInterval(() => {
        seconds++;
        const m = Math.floor(seconds/60), s = seconds%60;
        $('mem-time').textContent = `${m}:${s.toString().padStart(2,'0')}`;
      }, 1000);

      card.classList.add('flipped');
      flipped.push(card);

      if (flipped.length === 2) {
        moves++;
        $('mem-moves').textContent = `Moves: ${moves}`;
        locked = true;
        const [a, b] = flipped;
        if (a.dataset.piece === b.dataset.piece) {
          a.classList.add('matched'); b.classList.add('matched');
          matched += 2; flipped = []; locked = false;
          if (matched === deck.length) {
            clearInterval(timer);
            setTimeout(() => showWin('Matched!', `${moves} moves · ${fmtTime(seconds)}`, () => selectGame('memory')), 400);
          }
        } else {
          setTimeout(() => {
            a.classList.remove('flipped'); b.classList.remove('flipped');
            flipped = []; locked = false;
          }, 900);
        }
      }
    });

    grid.appendChild(card);
  });

  return () => clearInterval(timer);
}

// ══════════════════════════════════════════════════════════
// 2. SLIDING PUZZLE  (8×8 = 63 tiles + 1 empty)
// ══════════════════════════════════════════════════════════
function slideHTML() {
  return `
  <div class="game-header">
    <span class="game-title">Sliding Puzzle</span>
    <div class="stats">
      <span id="slide-moves">Moves: 0</span>
      <span id="slide-time">0:00</span>
    </div>
    <button class="btn" onclick="selectGame('slide')">Restart</button>
  </div>
  <div id="slide-grid"></div>`;
}

function initSlide() {
  let tiles = Array.from({length: N}, (_, i) => i); // 0 = empty slot
  let moves = 0, seconds = 0, timer = null, started = false;

  function neighbors(idx) {
    const r = Math.floor(idx / GRID), c = idx % GRID, n = [];
    if (r > 0)      n.push(idx - GRID);
    if (r < GRID-1) n.push(idx + GRID);
    if (c > 0)      n.push(idx - 1);
    if (c < GRID-1) n.push(idx + 1);
    return n;
  }

  // Scramble via random valid moves
  let emptyPos = 0;
  for (let i = 0; i < 1000; i++) {
    const nb = neighbors(emptyPos);
    const pick = nb[Math.floor(Math.random() * nb.length)];
    [tiles[emptyPos], tiles[pick]] = [tiles[pick], tiles[emptyPos]];
    emptyPos = pick;
  }

  const grid = $('slide-grid');

  function render() {
    grid.innerHTML = '';
    tiles.forEach((val, pos) => {
      const tile = document.createElement('div');
      if (val === 0) {
        tile.className = 'slide-tile empty';
      } else {
        tile.className = 'slide-tile';
        const col = (val - 1) % GRID;
        const row = Math.floor((val - 1) / GRID);
        const bg = document.createElement('div');
        bg.className = 'tile-bg';
        bg.style.cssText = bgStyle(col, row);
        tile.appendChild(bg);
        tile.addEventListener('click', () => clickTile(pos));
      }
      grid.appendChild(tile);
    });
  }

  function clickTile(pos) {
    const ei = tiles.indexOf(0);
    if (!neighbors(ei).includes(pos)) return;
    if (!started) {
      started = true;
      timer = setInterval(() => {
        seconds++;
        const m = Math.floor(seconds/60), s = seconds%60;
        $('slide-time').textContent = `${m}:${s.toString().padStart(2,'0')}`;
      }, 1000);
    }
    [tiles[ei], tiles[pos]] = [tiles[pos], tiles[ei]];
    moves++;
    $('slide-moves').textContent = `Moves: ${moves}`;
    render();
    if (tiles.every((v, i) => i === N - 1 ? v === 0 : v === i + 1)) {
      clearInterval(timer);
      setTimeout(() => showWin('Solved!', `${moves} moves · ${fmtTime(seconds)}`, () => selectGame('slide')), 200);
    }
  }

  render();
  return () => clearInterval(timer);
}

// ══════════════════════════════════════════════════════════
// 3. JIGSAW  (8×8 = 64 draggable pieces)
// ══════════════════════════════════════════════════════════
function jigsawHTML() {
  return `
  <div class="game-header">
    <span class="game-title">Jigsaw</span>
    <div class="stats">
      <span id="jig-placed">Placed: 0 / ${N}</span>
    </div>
    <button class="btn" onclick="selectGame('jigsaw')">Restart</button>
  </div>
  <div id="jigsaw-board">
    <div id="jigsaw-target"></div>
  </div>`;
}

function initJigsaw() {
  const board = $('jigsaw-board');
  const bw    = board.offsetWidth || 480;
  board.style.height = bw + 'px';

  const pw = bw / GRID;
  const ph = bw / GRID;
  const snap = pw * 0.4;
  let placed = 0;

  // Target grid overlay
  const target = $('jigsaw-target');
  for (let i = 0; i < N; i++) {
    const slot = document.createElement('div');
    slot.className = 'jigsaw-slot';
    target.appendChild(slot);
  }

  // Scatter starting positions (prevent heavy overlaps)
  const positions = [];
  for (let i = 0; i < N; i++) {
    let x, y, ok, attempts = 0;
    do {
      ok = true;
      x = Math.random() * (bw - pw);
      y = Math.random() * (bw - ph);
      for (const p of positions) {
        if (Math.abs(p.x - x) < pw * 0.5 && Math.abs(p.y - y) < ph * 0.5) { ok = false; break; }
      }
    } while (!ok && ++attempts < 40);
    positions.push({x, y});
  }
  shuffle(positions);

  for (let i = 0; i < N; i++) {
    const col = i % GRID;
    const row = Math.floor(i / GRID);

    const piece = document.createElement('div');
    piece.className = 'jigsaw-piece';
    piece.style.cssText = `width:${pw}px;height:${ph}px;left:${positions[i].x}px;top:${positions[i].y}px;`;
    piece.dataset.idx = i;

    const bg = document.createElement('div');
    bg.className = 'tile-bg';
    bg.style.cssText = bgStyle(col, row);
    piece.appendChild(bg);

    makeDraggable(piece, board, pw, ph, snap, col, row, () => {
      placed++;
      $('jig-placed').textContent = `Placed: ${placed} / ${N}`;
      if (placed === N) setTimeout(() => showWin('Assembled!', 'The face is complete!', () => selectGame('jigsaw')), 300);
    });

    board.appendChild(piece);
  }

  return () => {};
}

function makeDraggable(el, board, pw, ph, snap, targetCol, targetRow, onPlace) {
  let sx, sy, sl, st, dragging = false;

  function targetPos() {
    const bw = board.offsetWidth, bh = board.offsetHeight;
    return { x: targetCol * (bw / GRID), y: targetRow * (bh / GRID) };
  }

  function down(cx, cy) {
    if (el.classList.contains('placed')) return;
    dragging = true;
    const r = board.getBoundingClientRect();
    sx = cx - r.left; sy = cy - r.top;
    sl = parseFloat(el.style.left); st = parseFloat(el.style.top);
    el.classList.add('dragging');
  }

  function move(cx, cy) {
    if (!dragging) return;
    const r  = board.getBoundingClientRect();
    const bw = board.offsetWidth, bh = board.offsetHeight;
    el.style.left = Math.max(0, Math.min(bw - pw, cx - r.left - (sx - sl))) + 'px';
    el.style.top  = Math.max(0, Math.min(bh - ph, cy - r.top  - (sy - st))) + 'px';
  }

  function up() {
    if (!dragging) return;
    dragging = false;
    el.classList.remove('dragging');
    const tp = targetPos();
    const cl = parseFloat(el.style.left), ct = parseFloat(el.style.top);
    if (Math.abs(cl - tp.x) < snap && Math.abs(ct - tp.y) < snap) {
      el.style.left = tp.x + 'px'; el.style.top = tp.y + 'px';
      el.style.zIndex = 1;
      el.classList.add('placed');
      onPlace();
    }
  }

  el.addEventListener('mousedown', e => { e.preventDefault(); down(e.clientX, e.clientY); });
  window.addEventListener('mousemove', e => move(e.clientX, e.clientY));
  window.addEventListener('mouseup', up);
  el.addEventListener('touchstart', e => { e.preventDefault(); const t = e.touches[0]; down(t.clientX, t.clientY); }, {passive: false});
  window.addEventListener('touchmove', e => { const t = e.touches[0]; move(t.clientX, t.clientY); }, {passive: true});
  window.addEventListener('touchend', up);
}

// ══════════════════════════════════════════════════════════
// 4. FACE REVEAL  (8×8 = 64 tiles to click)
// ══════════════════════════════════════════════════════════
function revealHTML() {
  return `
  <div class="game-header">
    <span class="game-title">Face Reveal</span>
    <div class="stats">
      <span id="rev-clicks">Clicks: 0</span>
      <span id="rev-left">Left: ${N}</span>
    </div>
    <button class="btn" onclick="selectGame('reveal')">Restart</button>
  </div>
  <div id="reveal-grid"></div>`;
}

function initReveal() {
  const grid = $('reveal-grid');
  grid.innerHTML = '';
  let clicks = 0, revealed = 0;

  for (let i = 0; i < N; i++) {
    const col = i % GRID;
    const row = Math.floor(i / GRID);

    const tile = document.createElement('div');
    tile.className = 'reveal-tile';

    const bg = document.createElement('div');
    bg.className = 'tile-bg';
    bg.style.cssText = bgStyle(col, row);

    const cover = document.createElement('div');
    cover.className = 'reveal-cover';
    cover.textContent = '✦';

    tile.appendChild(bg);
    tile.appendChild(cover);

    tile.addEventListener('click', () => {
      if (tile.classList.contains('revealed')) return;
      clicks++; revealed++;
      tile.classList.add('revealed');
      $('rev-clicks').textContent = `Clicks: ${clicks}`;
      $('rev-left').textContent   = `Left: ${N - revealed}`;
      if (revealed === N) {
        setTimeout(() => showWin('Revealed!', `Uncovered in ${clicks} clicks!`, () => selectGame('reveal')), 400);
      }
    });

    grid.appendChild(tile);
  }

  return () => {};
}

// Boot
selectGame('memory');
</script>
</body>
</html>
